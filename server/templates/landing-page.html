<!doctype html>
<html lang="en">
  <head>
    <title>APP_NAME_PLACEHOLDER</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Space Grotesk", -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #0f0f1a;
        color: #fff;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        position: relative;
      }

      .bg-glow {
        position: absolute;
        border-radius: 50%;
        pointer-events: none;
      }
      .bg-glow-1 {
        top: -180px;
        left: 50%;
        transform: translateX(-50%);
        width: 600px;
        height: 600px;
        background: radial-gradient(
          circle,
          rgba(245, 166, 35, 0.08) 0%,
          transparent 60%
        );
      }
      .bg-glow-2 {
        bottom: -120px;
        right: -80px;
        width: 400px;
        height: 400px;
        background: radial-gradient(
          circle,
          rgba(124, 92, 252, 0.06) 0%,
          transparent 60%
        );
      }

      .content {
        position: relative;
        z-index: 2;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
      }

      .logo-img {
        width: 120px;
        height: 120px;
        border-radius: 30px;
        box-shadow: 0 12px 48px rgba(245, 166, 35, 0.18),
          0 0 0 1px rgba(245, 166, 35, 0.08);
        margin-bottom: 8px;
      }

      .app-name {
        font-size: 44px;
        font-weight: 700;
        background: linear-gradient(135deg, #f5a623, #ffcf6f);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: -1.5px;
        margin-bottom: 4px;
      }

      .tagline {
        font-size: 16px;
        font-weight: 400;
        color: rgba(255, 255, 255, 0.4);
        margin-bottom: 40px;
      }

      .actions {
        display: flex;
        gap: 14px;
        width: 100%;
        max-width: 340px;
      }

      .btn {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 15px 24px;
        font-family: "Space Grotesk", sans-serif;
        font-size: 15px;
        font-weight: 600;
        border-radius: 13px;
        border: none;
        cursor: pointer;
        transition: all 0.25s;
        text-decoration: none;
      }

      .btn-signin {
        background: transparent;
        color: rgba(255, 255, 255, 0.7);
        border: 1px solid rgba(255, 255, 255, 0.12);
      }
      .btn-signin:hover {
        background: rgba(255, 255, 255, 0.06);
        color: #fff;
        border-color: rgba(255, 255, 255, 0.22);
      }

      .btn-signup {
        background: #f5a623;
        color: #0f0f1a;
      }
      .btn-signup:hover {
        background: #ffd280;
        transform: translateY(-1px);
        box-shadow: 0 6px 24px rgba(245, 166, 35, 0.3);
      }

      .learn-more {
        margin-top: 32px;
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 13px;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.25);
        text-decoration: none;
        transition: color 0.2s;
      }
      .learn-more:hover {
        color: rgba(255, 255, 255, 0.5);
      }
      .learn-more svg {
        transition: transform 0.2s;
      }
      .learn-more:hover svg {
        transform: translateX(3px);
      }

      .loading {
        display: none;
        text-align: center;
      }
      .spinner {
        border: 2px solid rgba(255, 255, 255, 0.1);
        border-top-color: #f5a623;
        border-radius: 50%;
        width: 32px;
        height: 32px;
        animation: spin 0.8s linear infinite;
        margin: 20px auto;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      .loading-text {
        font-size: 15px;
        color: rgba(255, 255, 255, 0.5);
      }

      @media (max-width: 480px) {
        .logo-img {
          width: 96px;
          height: 96px;
          border-radius: 24px;
        }
        .app-name {
          font-size: 36px;
        }
        .tagline {
          font-size: 14px;
        }
        .actions {
          flex-direction: column;
          max-width: 280px;
        }
      }
    </style>
  </head>
  <body>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <div class="loading-text">Opening in Expo Go...</div>
    </div>

    <div class="content" id="content">
      <img
        src="/assets/images/icon.png"
        alt="APP_NAME_PLACEHOLDER"
        class="logo-img"
      />
      <h1 class="app-name">APP_NAME_PLACEHOLDER</h1>
      <p class="tagline">Your comedy set assistant</p>

      <div class="actions">
        <a href="#" class="btn btn-signin" id="signin-btn">Sign In</a>
        <a href="#" class="btn btn-signup" id="signup-btn">Sign Up</a>
      </div>

      <a href="/features" class="learn-more">
        Learn more
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </a>
    </div>

    <script>
      (function () {
        var ua = navigator.userAgent;
        var loadingEl = document.getElementById("loading");
        var contentEl = document.getElementById("content");
        var isAndroid = /Android/i.test(ua);
        var isIOS =
          /iPhone|iPad|iPod/i.test(ua) ||
          (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
        var deepLink = "exps://EXPS_URL_PLACEHOLDER";

        if (isAndroid || isIOS) {
          loadingEl.style.display = "block";
          contentEl.style.display = "none";
          window.location.href = deepLink;
          setTimeout(function () {
            loadingEl.style.display = "none";
            contentEl.style.display = "block";
          }, 500);
        }
      })();
    </script>
  </body>
</html>
